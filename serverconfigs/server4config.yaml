# Server Configuration
server_id: "integer_processor_server"
description: "Converts two inputs to integers and returns their sum"

# Runtime configuration - ALWAYS required

runtime:
  type: "go"
  command: "go"
  args: ['run', 'C:\Users\antho\GoMCP\generated_servers\integer_processor_server.go']
  port: 9000

# Tools provided by this server
tools:
  - tool_id: "process_to_integer"
    description: "Convert two inputs to integers and return their sum"
    handler: "process_to_integer"
    input_schema:
      properties: 
        input1:
          type: "string"
          description: "First input to convert"
        input2:
          type: "string"
          description: "Second input to convert"
    required:
      - input1
      - input2
